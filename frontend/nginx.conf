server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the Django backend service (docker-compose service name).
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin — useful when running the stack end-to-end.
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static files for Django admin.
    location /static/ {
        proxy_pass http://backend:8000/static/;
    }

    # Angular SPA fallback — every unknown URL returns index.html so the
    # client-side router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
