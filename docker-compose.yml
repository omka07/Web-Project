services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: quizroom
      POSTGRES_USER: quizroom
      POSTGRES_PASSWORD: quizroom
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizroom -d quizroom"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-change-me}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend,frontend"
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:80"
      DATABASE_URL: postgres://quizroom:quizroom@db:5432/quizroom
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             gunicorn myproject.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
